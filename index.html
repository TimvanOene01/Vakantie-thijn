<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vakantie-thijn</title>
    <meta
      name="description"
      content="Mobiele foto-scroll vol vakantiechaos met uitklapbare comments."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="public-view">
        <div class="site-topbar">
          <a class="hero-admin-link top-right" href="admin.html">admin</a>
        </div>
        <section class="hero">
          <p class="hero-kicker">Vakantie-thijn</p>
          <h1>Scroll en oordeel later.</h1>
          <p class="hero-copy">
            Zwarte achtergrond, domme foto's, en straks open comments onder elke
            foto zonder gedoe met accounts.
          </p>
          <div class="hero-actions">
            <a class="hero-jump" href="#feed">begin</a>
          </div>
        </section>

        <section id="feed" class="feed">
          <div id="photoFeed" class="photo-feed"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
